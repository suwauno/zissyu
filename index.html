<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>suwauno | Profile</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f0f1a, #000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

.card {
    background: rgba(255, 255, 255, 0.05);
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
    width: 350px;
    animation: fadeIn 1.5s ease;
}

h1 {
    font-size: 45px;
    margin: 0;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #00f2ff, #ff00e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    margin-top: 15px;
    font-size: 16px;
    color: #00f2ff;
    letter-spacing: 2px;
}

.line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, #00f2ff, #ff00e0);
    margin: 25px auto;
    border-radius: 5px;
}

p {
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.6;
}

.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 30px;
    background: linear-gradient(90deg, #00f2ff, #ff00e0);
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f2ff;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>suwauno</h1>
    <div class="subtitle">Creative Mind / Challenger</div>
    <div class="line"></div>
    <p>
        挑戦を楽しみ、常に進化する存在。<br>
        好奇心と行動力で未来を切り開く。
    </p>
    <a href="#" class="btn">Explore</a>
</div>

</body>
</html>
